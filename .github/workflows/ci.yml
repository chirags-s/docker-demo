name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: npm install

      - name: Run App (test basic startup)
        run: node index.js

      - name: Build Docker Image
        run: docker build -t docker-demo .
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Image
        run: docker tag docker-demo ${{ secrets.DOCKER_USERNAME }}/docker-demo

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/docker-demo
